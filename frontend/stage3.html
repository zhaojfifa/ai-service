<!DOCTYPE html>
<html lang="en">
  <head>
    <base href="./">
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>环节 3 - 发送邮件</title>
    <link rel="stylesheet" href="./styles.css?v=prui1a" />
  </head>
  <body data-stage="stage3">
    <header>
      <div class="header-content">
        <div>
          <h1>营销海报工作台</h1>
          <p>确认海报、收件人和邮件内容后发送。</p>
          <div id="build-info" class="build-info"></div>
        </div>
        <label class="api-config">
          <span>后端 API Base</span>
          <input
            type="url"
            id="api-base"
            placeholder="https://your-render-service.onrender.com"
          />
        </label>
      </div>
      <nav class="stage-nav" aria-label="Workflow navigation">
        <a href="index.html">环节 1 - 素材与文案</a>
        <span class="nav-arrow" aria-hidden="true">-></span>
        <a href="stage2.html">环节 2 - 生成海报</a>
        <span class="nav-arrow" aria-hidden="true">-></span>
        <span class="active">环节 3 - 发送邮件</span>
      </nav>
    </header>

    <main>
      <section class="card stage-card">
        <h2>环节 3 - 发送确认</h2>

        <div class="output-group" id="stage3-preview">
          <div class="stage3-send-target">
            <p id="stage3-save-gate" class="hint">发送对象：已保存海报</p>
            <p id="stage3-poster-identity" class="hint"></p>
          </div>
          <div class="stage3-legacy-preview" hidden aria-hidden="true">
            <figure class="poster-figure">
              <img id="stage3-poster-image" alt="Poster preview" />
              <figcaption id="stage3-poster-caption"></figcaption>
            </figure>
          </div>
        </div>

        <form id="email-form" class="stage3-form">
          <div class="output-group">
            <h3>收件人</h3>
            <label class="field">
              <span>收件邮箱</span>
              <textarea id="email-recipient" rows="3" required placeholder="alice@example.com, bob@example.com; team@example.com"></textarea>
            </label>
            <p id="email-recipient-feedback" class="hint"></p>
            <div class="stage3-recipient-grid">
              <div class="stage3-card">
                <h4>Ready To Send</h4>
                <div id="email-valid-recipients" class="stage3-pill-list"></div>
              </div>
              <div class="stage3-card stage3-card--warning" id="email-invalid-card" hidden>
                <h4>Needs Fix</h4>
                <div id="email-invalid-recipients" class="stage3-pill-list"></div>
              </div>
            </div>
          </div>

          <div class="output-group">
            <h3>文案确认</h3>
            <div class="grid">
              <label class="field">
                <span>邮件主题</span>
                <input type="text" id="email-subject" required />
              </label>
              <label class="field">
                <span>Preview Text</span>
                <input type="text" id="email-preview-text" />
              </label>
            </div>
          </div>

          <div class="output-group">
            <h3>邮件预览</h3>
            <label class="field">
              <span>正文</span>
              <textarea id="email-text" rows="8" required></textarea>
            </label>
            <p id="email-draft-source" class="hint"></p>
            <p id="email-draft-summary" class="hint"></p>
            <div id="email-html-preview" class="prompt-wrapper stage3-email-preview"></div>
          </div>

          <div class="output-group" id="email-attachment-group" hidden>
            <h3>附件与发送方式</h3>
            <p id="email-attachment-status" class="hint"></p>
            <div class="stage3-attachment-compact">
              <label class="field">
                <span>Delivery Mode</span>
                <select id="email-delivery-mode">
                  <option value="inline_only">inline_only</option>
                  <option value="resend">resend</option>
                </select>
              </label>
              <div class="stage3-attachment-options">
                <label><input type="checkbox" id="attachment-poster-png" value="poster_png" /> Poster PNG</label>
                <label><input type="checkbox" id="attachment-poster-pdf" value="poster_pdf" /> Poster PDF</label>
              </div>
            </div>
          </div>

          <div class="output-group">
            <h3>发送</h3>
            <div class="actions">
              <a class="secondary" href="stage2.html">返回环节 2</a>
              <button id="refresh-email-preview" class="secondary" type="button" disabled>AI 优化文案</button>
              <button id="send-email" class="primary" type="button" disabled>发送邮件</button>
            </div>
          </div>
        </form>

        <div id="email-source-details" hidden aria-hidden="true">
          <input id="stage3-poster-url" type="url" readonly />
          <input id="stage3-poster-key" type="text" readonly />
          <textarea id="email-html" rows="10" required></textarea>
          <div id="email-attachment-available"></div>
          <div id="email-attachment-selected"></div>
          <div id="email-attachment-buildable"></div>
        </div>
        <p id="stage3-status" role="status" aria-live="polite"></p>
      </section>
    </main>

    <footer>
      <small>Frontend hosted on GitHub Pages. Backend served via Render.</small>
    </footer>

    <script src="./app.js?v=prui1a" type="module"></script>
  </body>
</html>
