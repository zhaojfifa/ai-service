<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=1024, initial-scale=1" />
  <style>
__FONT_FACE_CSS__
__INLINE_CSS__
  </style>
</head>
<body>
  <div
    id="poster-root"
    data-template-id="__TEMPLATE_ID__"
    data-template-contract-version="__TEMPLATE_CONTRACT_VERSION__"
    style="--safe-margin: __SAFE_MARGIN__px;"
  >
    <div class="layer layer-background" aria-hidden="true"></div>
    <div class="safe-frame"></div>
    <div class="structured-overlay" aria-hidden="true">__SVG_OVERLAY__</div>

    <div
      class="layer layer-header-banner __HEADER_LAYER_CLASS__"
      data-region="header_region"
      data-rendered="__HEADER_REGION_RENDERED__"
      data-count="__HEADER_REGION_COUNT__"
      data-collapsed="__HEADER_REGION_COLLAPSED__"
    >
      <div class="region region-header" aria-hidden="true"></div>
      <div class="layer layer-header-shell">
        <div class="banner-surface"></div>
      </div>
      <div class="layer layer-brand-logo">
        <div class="slot slot-logo" style="__LOGO_STYLE__">
          <img src="__LOGO_URL__" alt="" loading="eager" />
        </div>
      </div>
      <div class="layer layer-brand-text">
        <div class="slot slot-brand" style="__BRAND_STYLE__">
          <div class="text-brand">__BRAND_TEXT__</div>
        </div>
      </div>
      <div class="layer layer-agent-pill">
        <div class="slot slot-agent" style="__AGENT_STYLE__">
          <div class="text-agent">__AGENT_TEXT__</div>
        </div>
      </div>
    </div>

    <div class="layer layer-scenario __SCENARIO_LAYER_CLASS__">
      <div class="region region-scenario" aria-hidden="true"></div>
      <div class="layer layer-scenario-card">
        <div class="scenario-card"></div>
      </div>
      <div class="layer layer-scenario-image">
        <div class="slot slot-scenario image-slot" style="__SCENARIO_STYLE__">
          <img src="__SCENARIO_URL__" alt="" loading="eager" />
        </div>
      </div>
    </div>

    <div class="layer layer-product">
      <div class="region region-product" aria-hidden="true"></div>
      <div class="layer layer-product-card-shell">
        <div class="product-card"></div>
      </div>
      <div class="layer layer-product-image">
        <div class="slot slot-product image-slot" style="__PRODUCT_STYLE__">
          <img src="__PRODUCT_URL__" alt="" loading="eager" />
        </div>
      </div>
    </div>

    <div
      class="layer layer-feature-callouts __FEATURE_LAYER_CLASS__"
      data-region="feature_region"
      data-rendered="__FEATURE_REGION_RENDERED__"
      data-count="__FEATURE_REGION_COUNT__"
      data-collapsed="__FEATURE_REGION_COLLAPSED__"
    >
      <div class="region region-feature" aria-hidden="true"></div>
      <div class="feature-layer">__FEATURE_ITEMS__</div>
    </div>

    <div class="layer layer-title-subtitle">
      <div class="text-zone-surface"></div>
      <div class="layer layer-title">
        <div class="slot slot-title text-title" style="__TITLE_STYLE__">__TITLE_TEXT__</div>
      </div>
      <div class="layer layer-subtitle">
        <div class="slot slot-subtitle text-subtitle" style="__SUBTITLE_STYLE__">__SUBTITLE_TEXT__</div>
      </div>
    </div>

    <div
      class="layer layer-bottom-gallery __GALLERY_LAYER_CLASS__"
      data-region="bottom_region"
      data-rendered="__BOTTOM_REGION_RENDERED__"
      data-count="__BOTTOM_REGION_COUNT__"
      data-collapsed="__BOTTOM_REGION_COLLAPSED__"
    >
      <div class="region region-bottom" aria-hidden="true"></div>
      <div class="layer layer-bottom-gallery-shell">
        <div class="gallery-surface"></div>
      </div>
      <div class="layer layer-bottom-gallery-items">
        <div class="gallery-strip" aria-hidden="true">__GALLERY_ITEMS__</div>
      </div>
    </div>

    <div class="layer layer-bottom-tagline __BOTTOM_TAGLINE_CLASS__">
      <div class="slot slot-bottom-tagline text-bottom-tagline" style="__BOTTOM_TAGLINE_STYLE__">__BOTTOM_TAGLINE_TEXT__</div>
    </div>
  </div>
</body>
</html>
