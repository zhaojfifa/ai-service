services:
  - type: web
    name: marketing-poster-api
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt && python -m playwright install chromium
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.5
      - key: GCP_PROJECT_ID
        value: your-gcp-project-id
      - key: GCP_LOCATION
        value: us-central1
      - key: GOOGLE_APPLICATION_CREDENTIALS
        value: /etc/secrets/service-account.json
      - key: GCP_KEY_B64
        sync: false
      - key: VERTEX_IMAGEN_MODEL_GENERATE
        value: imagen-3.0-generate-001
      - key: VERTEX_IMAGEN_MODEL_EDIT
        value: imagen-3.0-edit
      - key: VERTEX_TIMEOUT_SECONDS
        value: "60"
      - key: POSTER2_GENERATE_QUEUE_TIMEOUT_MS
        value: "10000"
      - key: POSTER2_GENERATE_TIMEOUT_MS
        value: "80000"
      # Puppeteer OOM/502 mitigation (HX-POSTER2-PUPPETEER-MEMORY-FIX-V1).
      # The poster canvas is 1024px at device_scale_factor=1, so both caps stay
      # above the canvas and are visually lossless. INLINE caps the per-image
      # bitmap Chromium decodes; LOAD caps the held-PIL floor. Together they keep
      # peak RSS for the full 7-asset payload under the 512 MB free-plan ceiling.
      - key: POSTER2_INLINE_MAX_DIMENSION
        value: "1280"
      - key: POSTER2_MAX_IMAGE_DIMENSION
        value: "1600"
      - key: CORS_ALLOW_ORIGINS
        value: https://zhaojfifa.github.io
      - key: CORS_ALLOW_CREDENTIALS
        value: "true"
      - key: OPS_UI_ENABLED
        value: "true"
      - key: OPS_USERNAME
        value: ops
      - key: OPS_PASSWORD
        sync: false
      - key: OPS_UI_SESSION_SECRET
        sync: false
      - key: OPS_UI_COOKIE_SAMESITE
        value: none
      - key: OPS_UI_COOKIE_SECURE
        value: "true"
      - key: VERTEX_SAFETY_FILTER_LEVEL
        value: block_some
      - key: VERTEX_SEED
        value: "0"
      # Poster 2.0 — Adobe Firefly background generation
      - key: FIREFLY_CLIENT_ID
        sync: false
      - key: FIREFLY_CLIENT_SECRET
        sync: false
